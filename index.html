<!DOCTYPE html>
<html data-dpr="1">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JWApp - 应用矩阵</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .container {
            max-width: 1080px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .title {
            font-size: 36px;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 16px;
            color: rgba(255,255,255,0.85);
        }
        
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        
        .app-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .app-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 50px rgba(0,0,0,0.2);
        }
        
        .app-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            font-weight: bold;
        }
        
        .app-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        
        .app-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        
        .app-badge {
            display: inline-block;
            padding: 6px 12px;
            background: #f5f5f7;
            border-radius: 12px;
            font-size: 12px;
            color: #666;
            font-weight: 500;
        }
        
        .app-badge.pro {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid rgba(255,255,255,0.3);
        }
        
        .footer-text {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 8px;
        }
        
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 16px;
        }
        
        .footer-link {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        
        .footer-link:hover {
            color: white;
            text-decoration: underline;
        }
        
        @media (max-width: 640px) {
            .container {
                padding: 30px 16px;
            }
            
            .title {
                font-size: 28px;
            }
            
            .app-grid {
                grid-template-columns: 1fr;
            }
            
            .app-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">JW</div>
            <h1 class="title">JWApp 应用矩阵</h1>
            <p class="subtitle">专注于打造优质 iOS 应用体验</p>
        </div>
        
        <div class="app-grid">
            <!-- ZAP -->
            <a href="https://apps.apple.com/cn/app/zap-ai/id1234567890" class="app-card" target="_blank">
                <div class="app-icon" style="background: linear-gradient(135deg, #FF6B6B, #FF8E53);">Z</div>
                <h3 class="app-name">ZAP-AI 短信拦截与智能取码</h3>
                <p class="app-desc">基于 AI 的智能短信过滤，验证码/取件码自动识别提取，支持灵动岛实时展示</p>
                <span class="app-badge pro">App Store</span>
            </a>
            
            <!-- 预留 App 2 -->
            <a href="#" class="app-card" style="opacity: 0.7;">
                <div class="app-icon" style="background: linear-gradient(135deg, #4ECDC4, #44A3AA);">?</div>
                <h3 class="app-name">即将推出</h3>
                <p class="app-desc">更多优质应用正在开发中，敬请期待...</p>
                <span class="app-badge">敬请期待</span>
            </a>
            
            <!-- 预留 App 3 -->
            <a href="#" class="app-card" style="opacity: 0.7;">
                <div class="app-icon" style="background: linear-gradient(135deg, #667eea, #764ba2);">?</div>
                <h3 class="app-name">即将推出</h3>
                <p class="app-desc">更多优质应用正在开发中，敬请期待...</p>
                <span class="app-badge">敬请期待</span>
            </a>
        </div>
        
        <div class="footer">
            <p class="footer-text">© 2026 JWApp. All rights reserved.</p>
            <div class="footer-links">
                <a href="https://jwapp.top/polocy.html" class="footer-link">隐私政策</a>
                <a href="https://jwapp.top/terms.html" class="footer-link">使用条款</a>
                <a href="mailto:zap@jwapp.top" class="footer-link">联系我们</a>
            </div>
        </div>
    </div>
</body>
</html>
